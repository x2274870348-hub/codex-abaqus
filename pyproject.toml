[project]
name = "codex-abaqus"
version = "1.0.0"
description = "MCP Server bridging Codex AI with Abaqus FEA â€?submit jobs, read ODB results, model via Python API, and execute arbitrary Abaqus scripts."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "abandon" }]
keywords = ["abaqus", "fea", "mcp", "codex", "simulation"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering",
]

dependencies = [
    "mcp>=1.0.0",
]

[project.scripts]
codex-abaqus = "codex_abaqus.server:main"

[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]